set -g mouse on
set -g set-clipboard on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g status-position top
set -g status-justify centre
set -g status-interval 5
set -g status-left-length 32
set -g status-right-length 80

set -g status-style "bg=#141420,fg=#cdd6f4"
set -g message-style "bg=#74a8fc,fg=#141420"
set -g message-command-style "bg=#6bd7ca,fg=#141420"
set -g mode-style "bg=#f9e2af,fg=#141420"

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#6bd7ca"
set -g display-panes-colour "#74a8fc"
set -g display-panes-active-colour "#f37799"

set -g status-left "#[bg=#6bd7ca,fg=#141420,bold] session #S #[bg=#141420,fg=#6bd7ca]::#[default]"
set -g status-right "#[bg=#141420,fg=#74a8fc]#H #[fg=#45475a]| #[fg=#f37799]%Y-%m-%d #[fg=#6bd7ca]%H:%M #[default]"

setw -g window-status-separator " "
setw -g window-status-format "#[fg=#585b70] #I:#W #[default]"
setw -g window-status-current-format "#[bg=#74a8fc,fg=#141420,bold] #I:#W #[default]"

setw -g clock-mode-colour "#f37799"
set -g set-titles on
set -g set-titles-string "#S :: #W"
